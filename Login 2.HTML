<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-box {
    width: 350px;
    padding: 40px;
    background: #1c1c1c;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0, 255, 150, 0.15);
    text-align: center;
  }

  .login-box h1 {
    color: white;
    margin-bottom: 20px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #00ff99;
    margin: 0 auto 30px auto;
  }

  .input-group {
    margin-bottom: 20px;
    text-align: left;
  }

  .input-group input {
    width: 100%;
    padding: 12px;
    border: none;
    border-bottom: 2px solid #444;
    background: transparent;
    color: white;
    font-size: 14px;
  }

  .input-group input:focus {
    outline: none;
    border-bottom: 2px solid #00ff99;
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    border: 2px solid #00ff99;
    background: transparent;
    color: #00ff99;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  .login-btn:hover {
    background: #00ff99;
    color: #111;
  }

  .extra-links {
    margin-top: 20px;
    font-size: 13px;
  }

  .extra-links a {
    color: #aaa;
    text-decoration: none;
  }

  .extra-links a:hover {
    color: #00ff99;
  }

</style>
</head>

<body>

<div class="login-box">
  <h1>Login</h1>
  <div class="divider"></div>

  <form>
    <div class="input-group">
      <input type="text" placeholder="Username" required>
    </div>

    <div class="input-group">
      <input type="password" placeholder="Password" required>
    </div>

    <button type="submit" class="login-btn">LOGIN NOW</button>
  </form>

  <div class="extra-links">
    <p><a href="#">Sign Up</a> | <a href="#">Forgot Password?</a></p>
  </div>
</div>

</body>
</html>
